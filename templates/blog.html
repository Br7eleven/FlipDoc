<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipDoc Blog — PDF Tips &amp; Guides</title>
    <meta name="description" content="Guides on PDF conversion, OCR technology, and document editing tips from the FlipDoc team.">
    <meta name="keywords" content="PDF tips, PDF conversion guides, OCR technology, document editing, FlipDoc blog">
    <meta name="author" content="FlipDoc by BR7 Technologies">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://flipdocconverter.vercel.app/blog">
    <link rel="icon" type="image/x-icon" href="/image/favicon/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="/image/favicon/favicon.svg">
    <link rel="icon" type="image/png" sizes="96x96" href="/image/favicon/favicon-96x96.png">
    <link rel="apple-touch-icon" href="/image/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/image/favicon/site.webmanifest">

    <meta property="og:title" content="FlipDoc Blog — PDF Tips &amp; Guides">
    <meta property="og:description" content="Guides on PDF conversion, OCR technology, and document editing tips from the FlipDoc team.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="FlipDoc">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0A0A0B;
            --surface: #111113;
            --surface-2: #16161A;
            --border: #222226;
            --accent: #00D97E;
            --accent-dim: #00D97E18;
            --text-primary: #F0F0F0;
            --text-secondary: #888890;
            --text-muted: #44444C;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: var(--text-primary); font-family: 'Inter', sans-serif; font-size: 16px; line-height: 1.7; overflow-x: hidden; }
        img { display: block; max-width: 100%; }
        a { color: inherit; text-decoration: none; }
        ul { list-style: none; }
        button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        nav { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 1px solid var(--border); height: 56px; display: flex; align-items: center; }
        .nav-inner { width: 100%; max-width: 1280px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; }
        .nav-logo { display: flex; align-items: center; gap: 10px; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 20px; color: var(--text-primary); letter-spacing: -0.02em; }
        .nav-logo img, .nav-logo svg { display: block; flex-shrink: 0; }
        .nav-links { display: flex; align-items: center; gap: 32px; }
        .nav-links a { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-secondary); transition: color 150ms ease; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent); }
        .nav-cta { font-family: 'Inter', sans-serif !important; font-weight: 600 !important; font-size: 13px !important; padding: 8px 20px; border: 1px solid var(--border) !important; color: var(--text-secondary) !important; transition: color 150ms, border-color 150ms; }
        .nav-cta:hover { border-color: var(--accent) !important; color: var(--accent) !important; }
        .nav-toggle { display: none; width: 40px; height: 40px; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 20px; }

        .section { padding: 120px 0; text-align: center; }
        .eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; color: var(--accent); margin-bottom: 16px; }
        .h1 { font-family: 'Inter', sans-serif; font-weight: 800; font-size: clamp(36px, 5vw, 48px); line-height: 1.1; letter-spacing: -0.04em; color: var(--text-primary); margin-bottom: 16px; }
        .body-text { font-family: 'Inter', sans-serif; font-size: 16px; color: var(--text-secondary); line-height: 1.7; max-width: 560px; margin: 0 auto; }

        footer { background: var(--bg); border-top: 1px solid var(--border); padding: 48px 24px 32px; }
        .footer-grid { max-width: 1080px; margin: 0 auto; display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 40px; }
        .footer-brand h5 { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 16px; color: var(--text-primary); margin-bottom: 12px; }
        .footer-brand p { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-secondary); line-height: 1.7; }
        .footer-col h5 { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 13px; color: var(--text-primary); margin-bottom: 16px; }
        .footer-col li { margin-bottom: 8px; }
        .footer-col a, .footer-col span { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-secondary); transition: color 150ms ease; }
        .footer-col a:hover { color: var(--text-primary); }
        .footer-bottom { max-width: 1080px; margin: 40px auto 0; padding-top: 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); }

        @media (max-width: 768px) {
            .section { padding: 64px 0; }
            .nav-links { display: none; position: absolute; top: 56px; left: 0; right: 0; background: var(--bg); border-bottom: 1px solid var(--border); flex-direction: column; padding: 24px; gap: 20px; }
            .nav-links.open { display: flex; }
            .nav-toggle { display: flex; }
            .footer-grid { grid-template-columns: 1fr 1fr; gap: 32px; }
            .footer-bottom { flex-direction: column; gap: 8px; text-align: center; }
            .h1 { font-size: 32px; }
        }
        @media (max-width: 480px) {
            .footer-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

{% include 'partials/navbar.html' %}

<section class="section">
    <div class="container">
        <p class="eyebrow">[ COMING SOON ]</p>
        <h1 class="h1">Guides &amp; Tips</h1>
        <p class="body-text">Coming soon — practical guides on PDF conversion, OCR, and document editing. In the meantime, <a href="/" style="color:var(--accent);">try the converter</a>.</p>
    </div>
</section>

{% include 'partials/footer.html' %}

<script>
(function() {
    var navToggle = document.getElementById('navToggle');
    var navLinks = document.getElementById('navLinks');
    navToggle.addEventListener('click', function() {
        var open = navLinks.classList.toggle('open');
        navToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
    document.getElementById('copyrightYear').textContent = new Date().getFullYear();
})();
</script>
</body>
</html>

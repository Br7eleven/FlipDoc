# FlipDoc Nginx config
# Place at: /etc/nginx/sites-available/flipdoc
# Then: ln -s /etc/nginx/sites-available/flipdoc /etc/nginx/sites-enabled/

# Rate limiting — 30 uploads/min per IP
limit_req_zone $binary_remote_addr zone=flipdoc_upload:10m rate=30r/m;
# Connection limiting — 20 conn per IP
limit_conn_zone $binary_remote_addr zone=flipdoc_conn:10m;

server {
    listen 80;
    server_name your-domain.com;   # <-- CHANGE THIS to your actual domain

    # Upload size limit (matches app MAX_FILE_SIZE)
    client_max_body_size 20M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logs
    access_log /var/log/nginx/flipdoc-access.log;
    error_log /var/log/nginx/flipdoc-error.log;

    # Static files — served directly by Nginx, no Flask overhead
    location /image/ {
        alias /opt/flipdoc/public/image/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /css/ {
        alias /opt/flipdoc/public/css/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /js/ {
        alias /opt/flipdoc/public/js/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon.ico {
        alias /opt/flipdoc/public/image/favicon/favicon.ico;
        expires 30d;
    }

    location = /favicon.png {
        alias /opt/flipdoc/public/image/favicon/favicon-96x96.png;
        expires 30d;
    }

    # Everything else → Gunicorn
    location / {
        limit_req zone=flipdoc_upload burst=10 nodelay;
        limit_conn flipdoc_conn 20;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for PDF conversions (up to 5 min)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;

        # Buffering off for download streaming
        proxy_buffering off;
    }
}
